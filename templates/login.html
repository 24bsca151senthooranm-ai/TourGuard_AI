<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TourGuard_AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { height: 100%; overflow: hidden; }
        body { position: relative; display: flex; background: #060b12; }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: linear-gradient(180deg, #0a1622, #0d1e2d);
            border-right: 1px solid rgba(90,140,180,0.25);
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 32px 0;
        }
        .sidebar .brand {
            text-align: center;
            color: #e8eef3;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 45px;
        }
        .sidebar .brand .icon { display: block; font-size: 24px; margin-bottom: 6px; }
        .side-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 28px;
            color: rgba(210,222,232,0.65);
            text-decoration: none;
            font-size: 13.5px;
            font-weight: 500;
            border-left: 3px solid transparent;
            transition: 0.25s;
        }
        .side-link:hover, .side-link.active {
            color: #7fc4ff;
            background: rgba(127,196,255,0.06);
            border-left: 3px solid #4a9fd8;
        }

        .scene {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #0d1a26;
            background-image:
                linear-gradient(180deg, rgba(6,14,26,0.55) 0%, rgba(6,14,26,0.75) 55%, rgba(4,9,18,0.92) 100%),
                url("https://images.unsplash.com/photo-1763583759309-23081fb2b23a?fm=jpg&q=80&w=1800&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .mist {
            position: absolute; left: -20%; width: 140%; height: 240px;
            background: linear-gradient(180deg, rgba(255,255,255,0.0), rgba(220,232,240,0.28), rgba(255,255,255,0.0));
            filter: blur(9px);
            z-index: 2;
            pointer-events: none;
        }
        .mist.m1 { top: 38%; animation: driftMist 26s linear infinite; opacity: 0.55; }
        .mist.m2 { top: 55%; animation: driftMist 34s linear infinite reverse; opacity: 0.4; height: 160px; }
        .mist.m3 { top: 70%; animation: driftMist 20s linear infinite; opacity: 0.5; height: 180px; }
        @keyframes driftMist {
            0% { transform: translateX(0); }
            100% { transform: translateX(12%); }
        }

        .vignette {
            position: absolute; inset: 0; z-index: 3; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(3,8,16,0.55) 100%);
        }

        .scene-content {
            position: relative; z-index: 5; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .brand-wrap { text-align: center; margin-bottom: 34px; }
        .brand-wrap h1 {
            font-size: 30px; font-weight: 700; color: #eef4f8;
            text-shadow: 0 2px 14px rgba(0,0,0,0.6);
        }
        .brand-wrap p {
            color: rgba(220,232,240,0.8); font-size: 13px; margin-top: 6px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.5);
        }

        #startStage { display: flex; flex-direction: column; align-items: center; transition: opacity 0.45s ease, transform 0.45s ease; }
        .start-card {
            width: 300px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(150,190,220,0.35);
            box-shadow: 0 25px 55px rgba(0,0,0,0.55);
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #0d1a26;
        }
        .start-card:hover { transform: translateY(-4px); box-shadow: 0 30px 65px rgba(0,0,0,0.6), 0 0 0 1px rgba(127,196,255,0.4); }
        .start-card img { width: 100%; height: 210px; object-fit: cover; object-position: center 30%; display: block; }
        .start-card .cap {
            background: linear-gradient(180deg, #101c28, #0a141d);
            padding: 16px 18px 18px 18px;
            text-align: center;
        }
        .start-card .cap .tap-label { color: #eef4f8; font-size: 14.5px; font-weight: 600; }
        .start-card .cap .sub-label { color: rgba(200,215,225,0.6); font-size: 11px; margin-top: 5px; }
        .pulse-ring {
            position: absolute; top: 14px; right: 14px; width: 10px; height: 10px; border-radius: 50%;
            background: #59d38c;
            animation: pulseDot 1.8s ease-out infinite;
            z-index: 2;
        }
        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(89,211,140,0.55); }
            70% { box-shadow: 0 0 0 10px rgba(89,211,140,0); }
            100% { box-shadow: 0 0 0 0 rgba(89,211,140,0); }
        }

        #dashStage {
            display: none;
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #dashStage.show { display: flex; flex-direction: column; align-items: center; opacity: 1; transform: translateY(0); }

        .dash-panel {
            width: 380px;
            background: linear-gradient(155deg, #17232f 0%, #0d151e 60%, #0a1119 100%);
            border: 1px solid rgba(120,160,190,0.28);
            border-radius: 18px;
            padding: 30px 34px 26px 34px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.55);
        }
        .dash-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 22px; padding-bottom: 16px;
            border-bottom: 1px solid rgba(120,160,190,0.15);
        }
        .gauge-ring {
            width: 46px; height: 46px; border-radius: 50%;
            background: conic-gradient(#4a9fd8 0deg 260deg, rgba(255,255,255,0.08) 260deg 360deg);
            display: flex; align-items: center; justify-content: center;
        }
        .gauge-ring::after { content: ''; width: 34px; height: 34px; border-radius: 50%; background: #0d151e; }
        .dash-top .label { color: rgba(210,225,235,0.55); font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase; }
        .dash-top .value { color: #eef4f8; font-size: 13px; font-weight: 600; margin-top: 2px; }

        .dash-panel input {
            width: 100%; padding: 13px 14px; margin-bottom: 14px; border: 1px solid rgba(120,160,190,0.25);
            border-radius: 9px; font-size: 14px; background: rgba(255,255,255,0.94); font-family: 'Poppins', sans-serif;
        }
        .dash-panel button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #2f6fa3, #1a4a75);
            color: #eef4f8; border: 1px solid rgba(120,180,220,0.4); border-radius: 9px; font-size: 14.5px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }
        .dash-panel button:hover { background: linear-gradient(135deg, #3a80b8, #205a8c); box-shadow: 0 8px 20px rgba(47,111,163,0.4); }

        .dash-strip { display: flex; justify-content: space-between; margin-top: 18px; }
        .dash-strip .indicator { display: flex; align-items: center; gap: 6px; font-size: 9.5px; color: rgba(200,215,225,0.45); letter-spacing: 0.5px; }
        .dash-strip .dot { width: 6px; height: 6px; border-radius: 50%; background: #4a9fd8; box-shadow: 0 0 6px #4a9fd8; }

        .back-to-start { margin-top: 16px; background: none; border: none; color: rgba(200,220,235,0.5); font-size: 11.5px; cursor: pointer; text-decoration: underline; }

        .footer-credit { position: fixed; bottom: 8px; right: 14px; font-size: 10.5px; color: rgba(255,255,255,0.35); z-index: 20; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><span class="icon">🛡</span>TourGuard_AI</div>
        <a href="/" class="side-link active">Log In ID</a>
        <a href="/about-app" class="side-link">About App</a>
        <a href="/about-developer" class="side-link">About Developer</a>
    </div>

    <div class="scene">
        <div class="mist m1"></div>
        <div class="mist m2"></div>
        <div class="mist m3"></div>
        <div class="vignette"></div>

        <div class="scene-content">
            <div class="brand-wrap">
                <h1>TourGuard_AI</h1>
                <p>Your Smart Travel Safety Companion</p>
            </div>

            <div id="startStage">
                <div class="start-card" onclick="showDashboard()">
                    <span class="pulse-ring"></span>
                    <img src="https://images.unsplash.com/photo-1764928414580-7112bf719232?fm=jpg&q=80&w=900&auto=format&fit=crop" alt="Start journey">
                    <div class="cap">
                        <div class="tap-label">Tap to Start Your Journey</div>
                        <div class="sub-label">Access the driver dashboard</div>
                    </div>
                </div>
            </div>

            <div id="dashStage">
                <div class="dash-panel">
                    <div class="dash-top">
                        <div class="gauge-ring"></div>
                        <div>
                            <div class="label">Driver Access</div>
                            <div class="value">Dashboard Login</div>
                        </div>
                        <div class="gauge-ring"></div>
                    </div>
                    <form action="/login" method="POST">
                        <input type="text" name="username" placeholder="Username" required>
                        <input type="password" name="password" placeholder="Password" required>
                        <button type="submit">Start Journey</button>
                    </form>

                    <div style="display:flex; align-items:center; gap:10px; margin:16px 0;">
                        <div style="flex:1; height:1px; background:rgba(120,160,190,0.25);"></div>
                        <span style="color:rgba(200,215,225,0.5); font-size:11px;">OR</span>
                        <div style="flex:1; height:1px; background:rgba(120,160,190,0.25);"></div>
                    </div>

                    <a href="/google-login" style="display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px; background:rgba(255,255,255,0.95); color:#1f1f1f; border-radius:9px; text-decoration:none; font-size:13.5px; font-weight:600;">
                        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12s5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                        Continue with Google
                    </a>

                    <div class="dash-strip">
                        <span class="indicator"><span class="dot"></span> SECURE</span>
                        <span class="indicator"><span class="dot"></span> ENCRYPTED</span>
                        <span class="indicator"><span class="dot"></span> ONLINE</span>
                    </div>
                </div>
                <button class="back-to-start" onclick="showStart()">&larr; Back</button>
            </div>
        </div>
    </div>

    <div class="footer-credit">Developed by Senthooran M</div>

    <script>
        function showDashboard() {
            document.getElementById('startStage').style.opacity = '0';
            document.getElementById('startStage').style.transform = 'translateY(-12px)';
            setTimeout(() => {
                document.getElementById('startStage').style.display = 'none';
                document.getElementById('dashStage').classList.add('show');
            }, 300);
        }
        function showStart() {
            document.getElementById('dashStage').classList.remove('show');
            setTimeout(() => {
                const s = document.getElementById('startStage');
                s.style.display = 'flex';
                s.style.opacity = '1';
                s.style.transform = 'translateY(0)';
            }, 200);
        }
    </script>
</body>
</html>
