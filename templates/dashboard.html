<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TourGuard_AI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body { min-height: 100%; }
        body { position: relative; display: flex; background: #060b12; }

        .sidebar {
            width: 220px; min-height: 100vh;
            background: linear-gradient(180deg, #0a1622, #0d1e2d);
            border-right: 1px solid rgba(90,140,180,0.25);
            z-index: 10; display: flex; flex-direction: column; padding: 32px 0;
        }
        .sidebar .brand { text-align: center; color: #e8eef3; font-weight: 700; font-size: 16px; margin-bottom: 30px; }
        .sidebar .brand .icon { display: block; font-size: 24px; margin-bottom: 6px; }
        .sidebar .welcome { text-align: center; color: rgba(200,220,235,0.6); font-size: 11.5px; margin-bottom: 30px; padding: 0 16px; }
        .side-link {
            display: flex; align-items: center; gap: 12px; padding: 15px 28px;
            color: rgba(210,222,232,0.65); text-decoration: none; font-size: 13.5px; font-weight: 500;
            border-left: 3px solid transparent; transition: 0.25s; letter-spacing: 0.3px;
        }
        .side-link:hover, .side-link.active { color: #7fc4ff; background: rgba(127,196,255,0.06); border-left: 3px solid #4a9fd8; }

        .scene {
            flex: 1; position: relative; min-height: 100vh;
            background-image:
                linear-gradient(180deg, rgba(6,14,26,0.65) 0%, rgba(6,14,26,0.8) 55%, rgba(4,9,18,0.94) 100%),
                url('https://images.unsplash.com/photo-1763583759309-23081fb2b23a?fm=jpg&q=80&w=1800&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 55px 20px;
        }
        .vignette { position: absolute; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse at center, transparent 45%, rgba(3,8,16,0.55) 100%); }

        .brand-wrap { position: relative; z-index: 1; text-align: center; margin-bottom: 30px; }
        .brand-wrap h1 { font-size: 28px; font-weight: 700; color: #eef4f8; text-shadow: 0 2px 14px rgba(0,0,0,0.6); }
        .brand-wrap p { color: rgba(220,232,240,0.8); font-size: 13px; margin-top: 6px; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }

        .dash-panel {
            position: relative; z-index: 1; width: 420px;
            background: linear-gradient(155deg, #17232f 0%, #0d151e 60%, #0a1119 100%);
            border: 1px solid rgba(120,160,190,0.28);
            border-radius: 18px; padding: 32px 36px 30px 36px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .dash-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(120,160,190,0.15);
        }
        .gauge-ring { width: 40px; height: 40px; border-radius: 50%; background: conic-gradient(#4a9fd8 0deg 260deg, rgba(255,255,255,0.08) 260deg 360deg); display: flex; align-items: center; justify-content: center; }
        .gauge-ring::after { content: ''; width: 30px; height: 30px; border-radius: 50%; background: #0d151e; }
        .dash-top .label { color: rgba(210,225,235,0.55); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .dash-top .value { color: #eef4f8; font-size: 13px; font-weight: 600; margin-top: 2px; }

        label { display: block; text-align: left; margin-bottom: 7px; font-weight: 500; color: rgba(220,232,240,0.85); font-size: 12.5px; letter-spacing: 0.3px; }
        select, input[type="date"], input[type="number"] {
            width: 100%; padding: 12px 13px; margin-bottom: 16px; border: 1px solid rgba(120,160,190,0.25);
            border-radius: 9px; font-size: 13.5px; background: rgba(255,255,255,0.94); font-family: 'Poppins', sans-serif;
        }
        button {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #2f6fa3, #1a4a75);
            color: #eef4f8; border: 1px solid rgba(120,180,220,0.4); border-radius: 9px;
            font-size: 14.5px; font-weight: 600; cursor: pointer; transition: 0.3s; letter-spacing: 0.4px;
        }
        button:hover { background: linear-gradient(135deg, #3a80b8, #205a8c); box-shadow: 0 8px 20px rgba(47,111,163,0.4); }

        .dash-strip { display: flex; justify-content: space-between; margin-top: 18px; }
        .dash-strip .indicator { display: flex; align-items: center; gap: 6px; font-size: 9px; color: rgba(200,215,225,0.45); letter-spacing: 0.5px; }
        .dash-strip .dot { width: 6px; height: 6px; border-radius: 50%; background: #4a9fd8; box-shadow: 0 0 6px #4a9fd8; }

        .footer-credit { position: fixed; bottom: 8px; right: 14px; font-size: 10.5px; color: rgba(255,255,255,0.35); z-index: 20; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><span class="icon">🛡</span>TourGuard_AI</div>
        <div class="welcome">Welcome, {{ username }} 👋</div>
        <a href="/dashboard" class="side-link active">Trip Planner</a>
        <a href="/about-app" class="side-link">About App</a>
        <a href="/about-developer" class="side-link">About Developer</a>
    </div>

    <div class="scene">
        <div class="vignette"></div>

        <div class="brand-wrap">
            <h1>Plan Your Safe Journey</h1>
            <p>AI-powered travel safety analysis in seconds</p>
        </div>

        <div class="dash-panel">
            <div class="dash-top">
                <div class="gauge-ring"></div>
                <div>
                    <div class="label">Trip Setup</div>
                    <div class="value">Journey Parameters</div>
                </div>
                <div class="gauge-ring"></div>
            </div>

            <form action="/analyze" method="POST">
                <label>Destination</label>
                <select name="location" required>
                    <option value="">-- Choose Location --</option>
                    <option value="Munnar">Munnar</option>
                    <option value="Ooty">Ooty</option>
                    <option value="Kodaikanal">Kodaikanal</option>
                    <option value="Coorg">Coorg</option>
                    <option value="Goa">Goa</option>
                </select>

                <label>Travel Date</label>
                <input type="date" name="travel_date" required>

                <label>Vehicle Type</label>
                <select name="vehicle" required>
                    <option value="">-- Choose Vehicle --</option>
                    <option value="Car">Car</option>
                    <option value="Bike">Bike</option>
                </select>

                <label>Total Distance (KM, round trip)</label>
                <input type="number" name="distance_km" placeholder="e.g. 300" required>

                <label>Number of Days</label>
                <input type="number" name="num_days" placeholder="e.g. 2" required>

                <label>Hotel Preference</label>
                <select name="hotel_tier" required>
                    <option value="">-- Choose Hotel Type --</option>
                    <option value="3_star">3-Star (Budget Friendly)</option>
                    <option value="5_star">5-Star (Luxury)</option>
                </select>

                <button type="submit">Analyze My Trip</button>
            </form>

            <div class="dash-strip">
                <span class="indicator"><span class="dot"></span> SECURE</span>
                <span class="indicator"><span class="dot"></span> AI-POWERED</span>
                <span class="indicator"><span class="dot"></span> REAL-TIME</span>
            </div>
        </div>
    </div>

    <div class="footer-credit">Developed by Senthooran M</div>
</body>
</html>
