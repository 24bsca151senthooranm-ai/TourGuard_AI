<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TourGuard_AI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: #060d14;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0,229,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.06) 1px, transparent 1px);
            background-size: 45px 45px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 45px 45px; }
        }
        body::after {
            content: '';
            position: fixed;
            top: -150px; left: -150px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,229,255,0.15), transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            animation: float1 9s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(60px, 50px); }
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,229,255,0.15);
            position: relative;
            z-index: 1;
        }
        .navbar h2 { font-size: 24px; font-weight: 700; }
        .navbar span { font-size: 14px; opacity: 0.8; }
        .hero {
            text-align: center;
            color: white;
            margin-top: 60px;
            position: relative;
            z-index: 1;
        }
        .hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 10px; }
        .hero p { opacity: 0.8; font-size: 15px; }
        .container {
            max-width: 550px;
            margin: 40px auto;
            background: rgba(6,20,30,0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0,229,255,0.35);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,229,255,0.15), 0 15px 35px rgba(0,0,0,0.4);
            transition: box-shadow 0.4s ease, transform 0.4s ease;
            position: relative;
            z-index: 1;
        }
        .container:hover {
            box-shadow: 0 0 40px rgba(0,229,255,0.3), 0 20px 45px rgba(0,0,0,0.5);
            transform: translateY(-3px);
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }
        select, input[type="date"], input[type="number"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 22px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            background: rgba(255,255,255,0.9);
            font-family: 'Poppins', sans-serif;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0,229,255,0.5), 0 8px 20px rgba(238,9,121,0.4);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🛡 TourGuard_AI</h2>
        <span>Welcome, {{ username }} 👋</span>
    </div>

    <div class="hero">
        <h1>Plan Your Safe Journey</h1>
        <p>AI-powered travel safety analysis in seconds</p>
    </div>

    <div class="container">
        <form action="/analyze" method="POST">
            <label>📍 Select Destination</label>
            <select name="location" required>
                <option value="">-- Choose Location --</option>
                <option value="Munnar">Munnar</option>
                <option value="Ooty">Ooty</option>
                <option value="Kodaikanal">Kodaikanal</option>
                <option value="Coorg">Coorg</option>
                <option value="Goa">Goa</option>
            </select>

            <label>📅 Select Travel Date</label>
            <input type="date" name="travel_date" required>

            <label>🚗 Vehicle Type</label>
            <select name="vehicle" required>
                <option value="">-- Choose Vehicle --</option>
                <option value="Car">Car</option>
                <option value="Bike">Bike</option>
            </select>

            <label>🛣️ Total Distance (in KM, round trip)</label>
            <input type="number" name="distance_km" placeholder="e.g. 300" required>

            <label>🗓️ Number of Days</label>
            <input type="number" name="num_days" placeholder="e.g. 2" required>

            <label>🏨 Hotel Preference</label>
            <select name="hotel_tier" required>
                <option value="">-- Choose Hotel Type --</option>
                <option value="3_star">3-Star (Budget Friendly)</option>
                <option value="5_star">5-Star (Luxury)</option>
            </select>

            <button type="submit">Analyze My Trip 🚀</button>
        </form>
    </div>

    <div style="position:fixed; bottom:8px; right:14px; font-size:10.5px; color:rgba(255,255,255,0.35); font-family:'Poppins', sans-serif; z-index:2;">
        Developed by Senthooran M
    </div>
</body>
</html>
